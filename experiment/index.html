<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Face-Flanker Memory Experiment</title>

    <!-- JATOS (if running on JATOS server) -->
    <script src="jatos.js"></script>
    <script>
        var base = document.createElement("base");
        var jatos_defined = typeof jatos !== "undefined";
        base.href = jatos_defined ? "." : "../";
        document.head.appendChild(base);
    </script>

    <!-- jsPsych core + CSS -->
    <script src="experiment/core/jspsych/jspsych.js"></script>
    <link href="experiment/core/jspsych/css/jspsych.css" rel="stylesheet" type="text/css" />

    <!-- Experiment CSS -->
    <link href="experiment/flanker.css" rel="stylesheet" type="text/css" />

    <!-- jsPsych plugins -->
    <script src="experiment/core/jspsych/plugins/plugin-html-keyboard-response.js"></script>
    <script src="experiment/core/jspsych/plugins/plugin-instructions.js"></script>
    <script src="experiment/core/jspsych/plugins/plugin-preload.js"></script>
    <script src="experiment/core/jspsych/plugins/plugin-call-function.js"></script>

    <!-- Stimulus manifest (generated by scripts/generate_manifest.py) -->
    <script src="experiment/stimuli.js"></script>

    <!-- Experiment modules -->
    <script src="experiment/helpers.js"></script>
    <script src="experiment/core/init_experiment.js"></script>
</head>
<body></body>

<!-- Initialize jsPsych (JATOS-aware) -->
<script>
    window.jsPsych = initializeExperiment();
</script>

<!-- Config must load after jsPsych init (uses jsPsych.data.getURLVariable) -->
<script src="experiment/config.js"></script>

<!-- Trial generation and timeline construction -->
<script src="experiment/trials.js"></script>
<script src="experiment/timeline.js"></script>

<!-- Main entry point -->
<script>
    if (CONDITION === null) {
        document.body.innerHTML =
            '<h2>Configuration Error</h2>' +
            '<p>No condition was assigned. The URL must include a <code>condition</code> ' +
            'parameter (1, 2, or 3).</p>' +
            '<p>Example: <code>?condition=1</code></p>';
    } else {
        var trialData = allocateTrials(CONDITION);
        var timeline = buildTimeline(jsPsych, trialData, CONDITION);
        var simulateMode = jsPsych.data.getURLVariable('simulate');
        if (simulateMode === 'visual' || simulateMode === 'data-only') {
            jsPsych.simulate(timeline, simulateMode);
        } else {
            jsPsych.run(timeline);
        }
    }
</script>
</html>
